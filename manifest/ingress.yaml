apiVersion: networking.k8s.io/v1
kind: Ingress 
metadata:
  name: pingpong-ingress 
spec:
  rules:
    - host: pingpong.com 
      http: 
        paths:
          - path: /
            pathType: Prefix 
            backend: 
              service: 
                name: frontend-service 
                port: 
                  number: 5000