apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: amitgiri13/pingpong-backend:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis-service
            - name: POSTGRES_HOST
              value: postgres-service
            - name: REQUEST_ORIGIN
              value: http://frontend-service