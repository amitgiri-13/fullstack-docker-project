apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: amitgiri13/pingpong-frontend:1.0.0
          ports:
            - containerPort: 5000
          env:
            - name: REACT_APP_BACKEND_URL
              value: http://pingpong.local